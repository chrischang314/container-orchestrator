# Default values for the generic app chart.
# Every app under apps/<name>/values.yaml overrides what it needs.

namespace: default
nameOverride: ""             # defaults to the helm release name

# Empty by default — public GHCR images need no auth. For private packages,
# add `- name: ghcr-creds` here (or override in apps/<name>/values.yaml) and
# run platform/components/ghcr-secret.sh to create the secret.
imagePullSecrets: []

serviceAccount:
  create: false
  name: ""
  annotations: {}

rbac:
  create: false
  clusterRoleName: ""
  rules: []

# List of services that make up this app. Each becomes one Deployment +
# (optionally) one Service + one PVC per persistence entry.
services: []
# Example shape (kept here for reference, not active):
# services:
#   - name: backend
#     image: ghcr.io/chrischang314/local-llm/backend
#     tag: main                   # poll target
#     port: 8000                  # Service port; omitted = no Service
#     containerPort: 8000         # optional; defaults to port
#     serviceName: backend        # optional: override the Service's DNS name
#                                 # (default: <release>-<service>)
#     replicas: 1
#     autoDeploy:
#       enabled: true
#       pollSchedule: "@every 5m"
#     env:
#       - name: OLLAMA_URL
#         value: http://host.docker.internal:11434
#     envFrom: []                 # configmap/secret refs
#     resources:
#       requests:
#         cpu: 50m
#         memory: 64Mi
#       limits:
#         memory: 256Mi
#     probes:
#       liveness:
#         httpGet: { path: /healthz, port: 8000 }
#         initialDelaySeconds: 10
#       readiness:
#         httpGet: { path: /healthz, port: 8000 }
#     persistence:
#       - name: data
#         size: 1Gi
#         mountPath: /app/data
#         accessMode: ReadWriteOnce   # default
#         # storageClassName: local-path   # omit to use the cluster's default

# Optional additional Services that point at an existing component Deployment.
# Useful when one pod needs separate Service types, such as a DNS LoadBalancer
# plus an internal web Service.
extraServices: []
# - name: web
#   component: pihole          # defaults to name; selector component to target
#   serviceType: ClusterIP
#   ports:
#     - name: http
#       port: 80
#       targetPort: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  # - host: local-llm.lan
  #   paths:
  #     - path: /
  #       pathType: Prefix
  #       service: frontend
  #       port: 80
  redirects: []
  # - host: old-name.lan
  #   to: http://new-name.lan/
  #   code: 308
  #   service: frontend             # backend is required by Kubernetes
  #   port: 80
  tls: []                      # populate when cert-manager + ClusterIssuer are configured
