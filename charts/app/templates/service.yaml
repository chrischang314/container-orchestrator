{{- range $svc := .Values.services }}
{{- if or $svc.port $svc.extraPorts }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.serviceName | default (include "app.serviceResourceName" (dict "root" $ "service" $svc)) }}
  namespace: {{ $.Values.namespace | default "default" }}
  labels:
    {{- include "app.serviceLabels" (dict "root" $ "service" $svc) | nindent 4 }}
spec:
  type: {{ default "ClusterIP" $svc.serviceType }}
  {{- with $svc.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with $svc.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    {{- if $svc.port }}
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ default "http" $svc.targetPort }}
      protocol: TCP
    {{- end }}
    {{- range $svc.extraPorts }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .port }}
      protocol: {{ default "TCP" .protocol }}
    {{- end }}
  selector:
    {{- include "app.selectorLabels" (dict "root" $ "service" $svc) | nindent 4 }}
{{- end }}
{{- end }}
