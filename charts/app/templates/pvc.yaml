{{- range $svc := .Values.services }}
{{- range $pvc := default (list) $svc.persistence }}
{{- if and (not $pvc.hostPath) (not $pvc.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $pvc.claimName | default (printf "%s-%s" (include "app.serviceResourceName" (dict "root" $ "service" $svc)) $pvc.name) }}
  namespace: {{ $.Values.namespace | default "default" }}
  labels:
    {{- include "app.serviceLabels" (dict "root" $ "service" $svc) | nindent 4 }}
  {{- if $pvc.keep }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
spec:
  accessModes:
    - {{ default "ReadWriteOnce" $pvc.accessMode }}
  resources:
    requests:
      storage: {{ $pvc.size | default "1Gi" }}
  {{- if $pvc.storageClassName }}
  storageClassName: {{ $pvc.storageClassName }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
