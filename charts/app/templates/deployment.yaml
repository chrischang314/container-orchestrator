{{- range $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.serviceResourceName" (dict "root" $ "service" $svc) }}
  namespace: {{ $.Values.namespace | default "default" }}
  labels:
    {{- include "app.serviceLabels" (dict "root" $ "service" $svc) | nindent 4 }}
  annotations:
    {{- $auto := default (dict) $svc.autoDeploy }}
    {{- if (dig "enabled" true $auto) }}
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: {{ default "@every 5m" $auto.pollSchedule | quote }}
    keel.sh/match-tag: "true"
    {{- end }}
    {{- with $svc.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{- if hasKey $svc "replicas" }} {{ $svc.replicas }}{{- else }} 1{{- end }}
  {{- if $svc.strategy }}
  strategy:
    {{- toYaml $svc.strategy | nindent 4 }}
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" (dict "root" $ "service" $svc) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" (dict "root" $ "service" $svc) | nindent 8 }}
    spec:
      {{- if or $svc.serviceAccountName $.Values.serviceAccount.create $.Values.serviceAccount.name }}
      serviceAccountName: {{ $svc.serviceAccountName | default (include "app.serviceAccountName" $) }}
      {{- end }}
      {{- if hasKey $svc "automountServiceAccountToken" }}
      automountServiceAccountToken: {{ $svc.automountServiceAccountToken }}
      {{- else if hasKey $.Values.serviceAccount "automountServiceAccountToken" }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      {{- end }}
      {{- if $svc.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: "{{ $svc.image }}:{{ default "main" $svc.tag }}"
          imagePullPolicy: {{ default "Always" $svc.imagePullPolicy }}
          {{- if $svc.command }}
          command: {{ toYaml $svc.command | nindent 12 }}
          {{- end }}
          {{- if $svc.args }}
          args: {{ toYaml $svc.args | nindent 12 }}
          {{- end }}
          {{- if or $svc.port $svc.extraPorts }}
          ports:
            {{- if $svc.port }}
            - name: http
              containerPort: {{ default $svc.port $svc.containerPort }}
              protocol: TCP
            {{- end }}
            {{- range $svc.extraPorts }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ default "TCP" .protocol }}
            {{- end }}
          {{- end }}
          {{- with $svc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.probes }}
          {{- with .liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if $svc.persistence }}
          volumeMounts:
            {{- range $svc.persistence }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
          {{- end }}
      {{- if $svc.persistence }}
      volumes:
        {{- range $svc.persistence }}
        - name: {{ .name }}
          {{- if .hostPath }}
          hostPath:
            path: {{ .hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .existingClaim | default .claimName | default (printf "%s-%s" (include "app.serviceResourceName" (dict "root" $ "service" $svc)) .name) }}
          {{- end }}
        {{- end }}
      {{- end }}
{{- end }}
