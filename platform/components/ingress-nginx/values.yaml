# ingress-nginx Helm values.
#
# Exposed via Service type LoadBalancer:
#   - Docker Desktop assigns "localhost" as the external IP and auto-forwards
#     to the Mac (so http://localhost:<port> works).
#   - k3s ships Klipper LB which assigns the node IP — works the same on
#     k3s-in-Lima once vmnet networking is enabled.
#
# Ports 80/443 on this Mac are taken by another service (Pi-hole), so we
# expose ingress on 8080/8443. App URLs become http://<host>:8080.

controller:
  kind: Deployment
  replicaCount: 1

  service:
    type: LoadBalancer
    ports:
      http: 8080
      https: 8443
    targetPorts:
      http: http
      https: https

  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  ingressClass: nginx
  watchIngressWithoutClass: true

  config:
    use-forwarded-headers: "true"
    proxy-body-size: "100m"
    enable-real-ip: "true"

  # Single-node cluster — don't fight ourselves on scheduling
  tolerations:
    - operator: Exists
