# Copy to container-orchestrator/apps/local-agent/values.yaml.
# Keep real secrets in Kubernetes Secrets or encrypted app storage.

namespace: default
nameOverride: local-agent

imagePullSecrets:
  - name: ghcr-creds

productionImagePolicy:
  requireDigestBeforeExecution: true

serviceAccount:
  create: false
  automountServiceAccountToken: false

services:
  - name: backend
    serviceAccountName: local-agent-backend
    automountServiceAccountToken: true
    serviceName: local-agent-backend
    image: ghcr.io/chrischang314/local-agent/backend
    tag: main
    digest: "sha256:52e968abe151b3e047b2cb9fd809a2d54c999d3aea34953839df5c9003f8dafe"
    autoDeploy:
      enabled: false
    port: 8000
    replicas: 1
    # The Mac Mini worker cannot reliably schedule a second backend pod during
    # a rolling-update surge, so replace this singleton in place.
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    env:
      - name: LOCAL_AGENT_DATABASE_PATH
        value: /app/data/local-agent.sqlite3
      - name: LOCAL_AGENT_RETRIEVAL_STORE_PATH
        value: /app/data/retrieval-store.json
      - name: LOCAL_AGENT_CHROMA_PATH
        value: /app/data/chroma
      - name: LOCAL_AGENT_MEMORY_STORE_PATH
        value: /app/data/memory-store.json
      - name: LOCAL_AGENT_COGNEE_PATH
        value: /app/data/cognee
      - name: LOCAL_AGENT_OPTIMIZATION_STORE_PATH
        value: /app/data/optimization-store.json
      - name: SHARED_AUTH_DB
        value: /shared-auth/auth.db
      - name: LOCAL_AGENT_SHARED_AUTH_DB
        value: /shared-auth/auth.db
      - name: LOCAL_AGENT_AUTH_SECRET_FILE
        value: /app/data/auth/local-agent-jwt-secret
      - name: LOCAL_AGENT_AUTH_REGISTRATION_ENABLED
        value: "true"
      - name: LOCAL_AGENT_OPERATOR_USERS
        value: Chris
      - name: LOCAL_AGENT_AGENT_EXECUTION_ENABLED
        value: "true"
      - name: LOCAL_AGENT_DESKTOP_ISOLATION_ENABLED
        value: "true"
      - name: LOCAL_AGENT_DESKTOP_ISOLATION_BACKEND
        value: synthetic
      - name: LOCAL_AGENT_GRAPH_CHECKPOINT_PATH
        value: /app/data/langgraph-checkpoints.sqlite
      - name: LOCAL_AGENT_WORKER_SERVICE_URL
        value: http://local-agent-worker:8080
      - name: LOCAL_AGENT_WORKER_DISPATCH_PATH
        value: /execute
      - name: LOCAL_AGENT_WORKER_REQUEST_TIMEOUT_SECONDS
        value: "180"
      - name: LOCAL_AGENT_WORKER_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: local-agent-worker-auth
            key: token
            optional: false
      - name: LOCAL_AGENT_MODEL_WORKER_NAMESPACE
        value: local-agent-model-workers
      - name: LOCAL_AGENT_MODEL_WORKER_SWITCH_LABEL
        value: app.kubernetes.io/component=external-worker-switch
      - name: LOCAL_AGENT_MODEL_ENDPOINTS
        valueFrom:
          configMapKeyRef:
            name: local-agent-external-model-endpoints
            key: MODEL_ENDPOINTS
            optional: true
      - name: LOCAL_AGENT_WEB_SEARCH_PROVIDER
        value: auto
      - name: LOCAL_AGENT_BRAVE_SEARCH_API_KEY
        valueFrom:
          secretKeyRef:
            name: local-agent-web-search
            key: brave-search-api-key
            optional: true
      - name: LOCAL_AGENT_FIRECRAWL_API_KEY
        valueFrom:
          secretKeyRef:
            name: local-agent-web-search
            key: firecrawl-api-key
            optional: true
      - name: LOCAL_AGENT_CLOUD_FALLBACK_ENABLED
        value: "false"
      - name: LOCAL_AGENT_ADMIN_TOKEN
        valueFrom:
          secretKeyRef:
            name: local-agent-admin
            key: token
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        memory: 2Gi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    persistence:
      - name: data
        claimName: local-agent-backend-data-nfs
        size: 20Gi
        mountPath: /app/data
        storageClassName: synology-nfs
      - name: shared-auth
        existingClaim: shared-auth-nfs
        mountPath: /shared-auth
    probes:
      readiness:
        httpGet:
          path: /api/health/ready
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 6
      liveness:
        tcpSocket:
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6

  - name: frontend
    serviceAccountName: local-agent-frontend
    automountServiceAccountToken: false
    serviceName: local-agent-frontend
    image: ghcr.io/chrischang314/local-agent/frontend
    tag: main
    digest: "sha256:b286379f55346a015e47b54a085b0b126f59b6908dc2bff8547a207b01e87d68"
    autoDeploy:
      enabled: false
    serviceType: LoadBalancer
    port: 12010
    containerPort: 8080
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 101
      runAsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    probes:
      readiness:
        httpGet:
          path: /
          port: 8080
        initialDelaySeconds: 3

  - name: worker
    serviceAccountName: local-agent-worker
    automountServiceAccountToken: false
    enableServiceLinks: false
    serviceName: local-agent-worker
    image: ghcr.io/chrischang314/local-agent/worker
    tag: main
    digest: "sha256:1aa22d0e7e33de14d26d30c5b8ba242421e1d999d10fbd9f04b9aaf56813a5d3"
    autoDeploy:
      enabled: false
    port: 8080
    strategy:
      type: Recreate
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    env:
      - name: LOCAL_AGENT_WORKER_BROWSER_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WORKER_CODING_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WORKER_DESKTOP_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WORKER_DESKTOP_BACKEND
        value: synthetic
      - name: LOCAL_AGENT_WORKER_DESKTOP_VNC_HOST
        value: ""
      - name: LOCAL_AGENT_WORKER_DESKTOP_ALLOWED_VNC_HOSTS
        value: "local-agent-desktop-sandbox.local-agent-sandbox.svc.cluster.local,local-agent-desktop-sandbox"
      - name: LOCAL_AGENT_WORKER_DESKTOP_VNC_PORT
        value: "5900"
      - name: LOCAL_AGENT_WORKER_MCP_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WORKER_SMOLAGENTS_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WORKER_WEB_ENABLED
        value: "true"
      - name: LOCAL_AGENT_WEB_SEARCH_PROVIDER
        value: auto
      - name: LOCAL_AGENT_BRAVE_SEARCH_API_KEY
        valueFrom:
          secretKeyRef:
            name: local-agent-web-search
            key: brave-search-api-key
            optional: true
      - name: LOCAL_AGENT_FIRECRAWL_API_KEY
        valueFrom:
          secretKeyRef:
            name: local-agent-web-search
            key: firecrawl-api-key
            optional: true
      - name: LOCAL_AGENT_WORKER_PORT
        value: "8080"
      - name: LOCAL_AGENT_WORKER_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: local-agent-worker-auth
            key: token
            optional: false
      - name: LOCAL_AGENT_WORKER_ARTIFACT_BASE
        value: /worker/artifacts
    resources:
      requests:
        cpu: 10m
        memory: 8Mi
      limits:
        memory: 2Gi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    persistence:
      - name: artifacts
        claimName: local-agent-worker-artifacts-nfs
        size: 20Gi
        mountPath: /worker/artifacts
        storageClassName: synology-nfs

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localagent.lan
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 12010
