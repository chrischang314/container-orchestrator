# Deployment config for chrischang314/local-llm.
#
# Two services in-cluster (backend + frontend). Ollama runs on the Mac host
# directly (Apple Metal acceleration), reachable from pods via
# host.lima.internal:11434 through the Mac Mini Lima worker.

namespace: default
nameOverride: local-llm

# local-llm's GHCR packages are public; no pull secret needed.
# For private images, uncomment and run platform/components/ghcr-secret.sh:
# imagePullSecrets:
#   - name: ghcr-creds

services:
  - name: backend
    # The frontend's nginx.conf hardcodes `proxy_pass http://backend:8000`,
    # so the Service must be reachable at exactly that hostname.
    serviceName: backend
    image: ghcr.io/chrischang314/local-llm/backend
    tag: main
    port: 8000
    replicas: 1
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    hostAliases:
      - ip: 192.168.5.2
        hostnames:
          - host.lima.internal

    env:
      - name: OLLAMA_URL
        value: http://host.lima.internal:11434
      - name: SHARED_AUTH_DB
        value: /shared-auth/auth.db

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi

    persistence:
      - name: data
        claimName: local-llm-backend-data-nfs
        size: 1Gi
        mountPath: /app/data
        storageClassName: synology-nfs
      - name: shared-auth
        existingClaim: shared-auth-nfs
        mountPath: /shared-auth

    probes:
      readiness:
        # FastAPI has no `/` route; /openapi.json is always present and cheap.
        httpGet:
          path: /openapi.json
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10

  - name: frontend
    image: ghcr.io/chrischang314/local-llm/frontend
    tag: main
    serviceType: LoadBalancer
    port: 12000
    containerPort: 80
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker

    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi

    probes:
      readiness:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localllm.lan
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 12000
