# Model trading bot dashboard.
namespace: default
nameOverride: model-trading-bot

imagePullSecrets:
  - name: ghcr-creds

services:
  - name: backend
    image: ghcr.io/chrischang314/model-trading-bot/backend
    tag: main
    port: 8000
    replicas: 1
    # The backend is a PVC-backed singleton on the Mac Mini worker. Replace it
    # in place so upgrades do not mount the same data/auth claims from a surge pod.
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    env:
      - name: DEFAULT_SYMBOLS
        value: AAPL,AMZN,META,NFLX,GOOGL
      - name: DATA_PROVIDER
        value: yfinance
      - name: STORAGE_BACKEND
        value: local
      - name: LOCAL_DATA_DIR
        value: /app/data
      - name: SHARED_AUTH_DB
        value: /shared-auth/auth.db
      - name: BOOTSTRAP_ON_STARTUP
        value: "true"
      - name: AUTO_INGEST_ON_EMPTY
        value: "true"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    probes:
      readiness:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 6
      liveness:
        tcpSocket:
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
    persistence:
      - name: data
        claimName: model-trading-bot-backend-data-nfs
        mountPath: /app/data
        size: 2Gi
        storageClassName: synology-nfs
      - name: shared-auth
        existingClaim: shared-auth-nfs
        mountPath: /shared-auth

  - name: frontend
    image: ghcr.io/chrischang314/model-trading-bot/frontend
    tag: main
    serviceType: LoadBalancer
    port: 14000
    containerPort: 80
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    env:
      - name: BACKEND_HOST
        value: model-trading-bot-backend
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    probes:
      readiness:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: modeltradingbot.lan
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 14000
