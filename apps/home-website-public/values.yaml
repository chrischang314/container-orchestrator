# Public portfolio site for chriswchang.com.
namespace: default
nameOverride: home-website-public

imagePullSecrets:
  - name: ghcr-creds

services:
  - name: web
    image: ghcr.io/chrischang314/home-website
    tag: public
    port: 80
    targetPort: 8080
    containerPort: 8080
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: rpi5-control
    selectorLabels:
      app: home-website-public
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: home-website-public
      app.kubernetes.io/name: home-website-public
    autoDeploy:
      enabled: true
      pollSchedule: "@every 5m"

    env:
      - name: SITE_AUDIENCE
        value: public
      - name: PORT
        value: "8080"
      - name: CLOUDFLARE_ACCESS_REQUIRED
        value: "false"
      - name: CLOUDFLARE_ACCESS_AUD
        valueFrom:
          secretKeyRef:
            name: cloudflare-access-home-website-public
            key: aud
            optional: true
      - name: CLOUDFLARE_ACCESS_TEAM_DOMAIN
        valueFrom:
          secretKeyRef:
            name: cloudflare-access-home-website-public
            key: team-domain
            optional: true
      - name: MODEL_TRADING_BOT_PROXY_URL
        value: http://model-trading-bot-frontend.default.svc.cluster.local:14000
      - name: MODEL_TRADING_BOT_API_PROXY_URL
        value: http://model-trading-bot-backend.default.svc.cluster.local:8000
      - name: TRADING_BOT_PROXY_URL
        value: http://trading-bot.trading-bot.svc.cluster.local
      - name: LOCAL_LLM_PROXY_URL
        value: http://local-llm-frontend.default.svc.cluster.local:12000
      - name: LOCAL_AGENT_PROXY_URL
        value: http://local-agent-frontend.default.svc.cluster.local:12010
      - name: RECRUITING_APP_PROXY_URL
        value: http://recruiting-app-frontend-public.default.svc.cluster.local:13001/recruiting-app
      - name: MODEL_RAILROAD_PROXY_URL
        value: http://model-railroad-automation-web-control.default.svc.cluster.local:15000
      - name: K8S_CLUSTER_STATUS_PROXY_URL
        value: http://k8s-cluster-status-web.default.svc.cluster.local

    probes:
      readiness:
        httpGet:
          path: /api/health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      liveness:
        httpGet:
          path: /api/health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 20

extraServices:
  # Compatibility service for the Cloudflare Tunnel public hostname target. The
  # chart-native web Service remains `home-website-public-web` for ingress.
  - name: web-alias
    component: web
    serviceName: home-website-public
    ports:
      - name: http
        port: 80
        targetPort: http

ingress:
  enabled: true
  name: home-website-public
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http01
  hosts:
    - host: chriswchang.com
      paths:
        - path: /
          pathType: Prefix
          service: web
          port: 80
    - host: www.chriswchang.com
      paths:
        - path: /
          pathType: Prefix
          service: web
          port: 80
    # Default route for direct public-IP HTTP requests. HTTPS by IP will still
    # show a certificate name mismatch because public certs cannot cover this IP.
    - paths:
        - path: /
          pathType: Prefix
          service: web
          port: 80
  tls:
    - hosts:
        - chriswchang.com
        - www.chriswchang.com
      secretName: chriswchang-com-tls
