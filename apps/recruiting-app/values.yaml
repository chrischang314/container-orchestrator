# Recruiting assistant pipeline - scraper + API + frontend.
#
# PRE-DEPLOY CHECKLIST:
#   1. recruiting-db-secret must exist (created by postgres app bootstrap).
#   2. ghcr-creds must exist: run platform/components/ghcr-secret.sh.
#   3. Deploy postgres first so the DB is ready before migrations run:
#        helm upgrade --install postgres charts/app -f apps/postgres/values.yaml
#   4. Generate a 1point3acres session and copy it into the scraper pod/PVC:
#        cd /Users/chrischang/Projects/recruiting-app && python scripts/login.py
#        POD=$(kubectl get pod -l app.kubernetes.io/component=scraper -o jsonpath='{.items[0].metadata.name}')
#        kubectl cp data/storage_state.json $POD:/app/data/storage_state.json
#   5. 1point3acres should remain disabled until the login helper confirms the
#      mobile API returns an authenticated member_uid and not user_banned.

namespace: default
nameOverride: recruiting-app

imagePullSecrets:
  - name: ghcr-creds

services:
  # ── API ────────────────────────────────────────────────────────────────────
  - name: api
    image: ghcr.io/chrischang314/recruiting-app/api
    tag: main
    port: 8000
    replicas: 1
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker

    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: recruiting-db-secret
            key: database-url
      - name: EMBEDDER
        value: bge-m3
      - name: TRANSLATION_OLLAMA_URL
        value: http://host.lima.internal:11434
      - name: TRANSLATION_MODEL
        value: llama3.2:3b
      - name: TRANSLATION_TIMEOUT_SECONDS
        value: "90"
      - name: TRANSLATION_MAX_CHARS
        value: "6000"
      - name: HF_HOME
        value: /app/.hf-cache
      - name: SHARED_AUTH_DB
        value: /shared-auth/auth.db
      - name: PROJECTS_LAN_COOKIE_NAME
        value: projects_lan_session
      - name: PROJECTS_LAN_LOGIN_URL
        value: http://projects.lan/api/auth/login

    hostAliases:
      - ip: 192.168.5.2
        hostnames:
          - host.lima.internal

    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        # BGE-M3 weights + tokenizer + inference state need >2Gi on the first
        # query; OOMKilled at 2Gi when /search loads the model.
        memory: 4Gi

    probes:
      readiness:
        httpGet:
          path: /healthz
          port: 8000
        # BGE-M3 model download on first start can take several minutes.
        initialDelaySeconds: 120
        periodSeconds: 15
        failureThreshold: 20
      liveness:
        httpGet:
          path: /healthz
          port: 8000
        initialDelaySeconds: 180
        periodSeconds: 30

    persistence:
      - name: hf-cache
        claimName: recruiting-app-api-hf-cache-nfs
        mountPath: /app/.hf-cache
        size: 5Gi
        storageClassName: synology-nfs
      - name: shared-auth
        existingClaim: shared-auth-nfs
        mountPath: /shared-auth

  # ── Scraper daemon ─────────────────────────────────────────────────────────
  - name: scraper
    image: ghcr.io/chrischang314/recruiting-app/scraper
    tag: main
    # No port — daemon only, no HTTP surface.
    replicas: 1
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    autoDeploy:
      enabled: true

    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: recruiting-db-secret
            key: database-url
      - name: HF_HOME
        value: /app/.hf-cache
      - name: SCRAPER_SOURCES
        value: geeksforgeeks,code360,stackexchange,devto,nowcoder,hackernews,reddit
      - name: SCRAPER_HEADLESS
        value: "true"
      - name: SCRAPER_STORAGE_STATE_PATH
        value: /app/data/storage_state.json
      - name: SCRAPER_USE_STORAGE_STATE
        value: "false"
      - name: SCRAPER_REQUIRE_STORAGE_STATE
        value: "false"
      - name: SCRAPER_IMAGE_DIR
        value: /app/data/images
      - name: SCRAPER_MIN_REQUEST_INTERVAL_SECS
        value: "0.5"
      - name: SCRAPER_MAX_REQUEST_INTERVAL_SECS
        value: "1.25"
      - name: SCRAPER_MAX_CONCURRENT_REQUESTS
        value: "10"
      - name: SCRAPER_REFRESH_EXISTING_POSTS
        value: "false"
      - name: SCRAPER_MAX_PAGES_PER_CATEGORY
        value: "1000"
      - name: SCRAPER_USE_MOBILE_API
        value: "true"
      - name: SCRAPER_API_THREADS_PER_PAGE
        value: "100"
      - name: SCRAPER_API_POSTS_PER_PAGE
        value: "50"
      - name: SCRAPER_MAX_THREAD_PAGES_PER_POST
        value: "0"
      - name: SCRAPER_ENABLE_CRAWL
        value: "true"
      - name: SCRAPER_ENABLE_JOB_CRAWL
        value: "true"
      - name: SCRAPER_ENABLE_EMBED
        value: "true"
      - name: SCRAPER_ENABLE_OCR
        # OCR is paused on the Mac Mini processor because PaddleOCR plus the
        # loaded BGE-M3 embedder can exceed the pod/node memory budget.
        value: "false"
      - name: SCRAPER_ENABLE_QUESTION
        value: "true"
      - name: SCRAPER_CRAWL_INTERVAL_HOURS
        value: "0.5"
      - name: SCRAPER_JOB_CRAWL_INTERVAL_HOURS
        value: "12.0"
      - name: SCRAPER_QUESTION_INTERVAL_MINUTES
        # Keep question extraction on a non-aligned cadence from the 1.5-minute
        # embed job so the shared scraper lock does not periodically collide.
        value: "7.37"
      - name: SCRAPER_QUESTION_BATCH_SIZE
        value: "100"
      - name: SCRAPER_EMBED_INTERVAL_MINUTES
        value: "1.5"
      - name: SCRAPER_REDDIT_LIMIT_PER_QUERY
        value: "100"
      - name: SCRAPER_REDDIT_TIME_FILTER
        value: all
      - name: SCRAPER_REDDIT_SUBREDDITS
        value: cscareerquestions,ExperiencedDevs,leetcode,csMajors,ITCareerQuestions,EngineeringResumes,AskProgramming,learnprogramming,webdev,developersIndia
      - name: SCRAPER_REDDIT_QUERIES
        value: interview,onsite,online assessment,OA,system design,behavioral interview,coding interview,phone screen,take home,new grad interview,intern interview,offer negotiation,Google interview,Amazon interview,Meta interview,Microsoft interview,Apple interview,Netflix interview,OpenAI interview,Anthropic interview,Databricks interview,Stripe interview,Airbnb interview,Uber interview,TikTok interview,Bloomberg interview,Goldman Sachs interview,Jane Street interview,Two Sigma interview,Citadel interview,Roblox interview,Palantir interview
      - name: SCRAPER_HACKERNEWS_QUERIES
        value: interview,software engineer interview,coding interview,system design interview,online assessment,phone screen,take home,Google interview,Amazon interview,Meta interview,Microsoft interview,Apple interview,Netflix interview,OpenAI interview,Anthropic interview,Databricks interview,Stripe interview,Airbnb interview,Uber interview,TikTok interview,Bloomberg interview,Goldman Sachs interview,Jane Street interview,Two Sigma interview,Citadel interview,Roblox interview,Palantir interview,LeetCode
      - name: SCRAPER_HACKERNEWS_LIMIT_PER_QUERY
        value: "100"
      - name: SCRAPER_HACKERNEWS_PAGES_PER_QUERY
        value: "2"
      - name: SCRAPER_STACKEXCHANGE_LIMIT_PER_QUERY
        value: "50"
      - name: SCRAPER_STACKEXCHANGE_PAGES_PER_QUERY
        value: "2"
      - name: SCRAPER_STACKEXCHANGE_SITES
        value: workplace,stackoverflow,softwareengineering,cseducators
      - name: SCRAPER_STACKEXCHANGE_QUERIES
        value: technical interview,behavioral interview,system design interview,software engineer interview,coding interview,phone screen,take home assignment,online assessment,new grad interview,internship interview,resume screen,offer negotiation,leetcode
      - name: SCRAPER_DEVTO_TAGS
        value: interview,career,jobhunt,jobsearch,systemdesign,leetcode,programming,webdev,javascript,python,java,devops,softwareengineering,computerscience
      - name: SCRAPER_DEVTO_LIMIT_PER_TAG
        value: "80"
      - name: SCRAPER_DEVTO_PAGES_PER_TAG
        value: "2"
      - name: SCRAPER_GEEKSFORGEEKS_MAX_PAGES
        value: "12"
      - name: SCRAPER_CODE360_PAGES
        value: "10"
      - name: SCRAPER_CODE360_LIMIT_PER_PAGE
        value: "100"
      - name: SCRAPER_NOWCODER_DISCOVER_URLS
        value: https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E7%BB%8F,https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E8%AF%95,https://www.nowcoder.com/discuss?type=2&order=3&query=%E6%A0%A1%E6%8B%9B,https://www.nowcoder.com/discuss?type=2&order=3&query=%E5%AE%9E%E4%B9%A0,https://www.nowcoder.com/discuss?type=0&order=3,https://www.nowcoder.com/?target=main
      - name: SCRAPER_NOWCODER_LIMIT
        value: "200"
      - name: SCRAPER_JOB_SOURCES
        value: openquant,career_pages
      - name: SCRAPER_OPENQUANT_API_BASE_URL
        value: https://server.openquant.co
      - name: SCRAPER_OPENQUANT_POSITION_TYPES
        value: Quantitative Trader,Quantitative Researcher,Quantitative Developer,Quantitative Analyst,Data Scientist,Machine Learning Engineer
      - name: SCRAPER_OPENQUANT_PAGE_SIZE
        value: "100"
      - name: SCRAPER_OPENQUANT_MAX_PAGES_PER_TYPE
        value: "20"
      - name: SCRAPER_CAREER_PAGE_MAX_LINKS_PER_COMPANY
        value: "25"

    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        # BGE-M3 embedding can exceed 4Gi while the scraper backfills chunks.
        memory: 6Gi

    persistence:
      # data/ holds storage_state.json (1point3acres session) + scraped images.
      # Docker Desktop K8s can't bind-mount macOS paths, so we use PVCs and
      # `kubectl cp` the storage_state.json into the pod after deploy.
      - name: data
        claimName: recruiting-app-scraper-data-nfs
        mountPath: /app/data
        size: 5Gi
        storageClassName: synology-nfs
      - name: hf-cache
        claimName: recruiting-app-scraper-hf-cache-nfs
        mountPath: /app/.hf-cache
        size: 5Gi
        storageClassName: synology-nfs

  # -- Optional external PC scraper switches -----------------------------------
  # These tiny pods do not scrape. They give the Kubernetes UI a normal Deployment
  # to scale; Windows-side controllers watch the switch and start/stop local
  # Docker crawler containers on each PC.
  - name: chris-pc-2-scraper-switch
    component: external-worker-switch
    image: registry.k8s.io/pause
    tag: "3.10"
    replicas: 1
    autoDeploy:
      enabled: false
    labels:
      local-llm.io/worker: chris-pc-2-scraper
      local-llm.io/optional: "true"
      recruiting-app.io/worker: chris-pc-2-scraper
      recruiting-app.io/role: crawler
    extraSelectorLabels:
      local-llm.io/worker: chris-pc-2-scraper
    annotations:
      local-llm.io/control-help: "Scale replicas to 1 to enable CHRIS-PC-2 recruiting scraper, or 0 to stop it."
      local-llm.io/controlled-by: "scripts/local-scraper-worker-controller.ps1 running on CHRIS-PC-2"
      recruiting-app.io/image: "ghcr.io/chrischang314/recruiting-app/scraper:pc-crawler-amd64"
      recruiting-app.io/sources: "geeksforgeeks,code360,stackexchange,devto,nowcoder,hackernews,reddit"
      recruiting-app.io/crawl-interval-hours: "0.5"
      recruiting-app.io/min-request-interval-secs: "0.5"
      recruiting-app.io/max-request-interval-secs: "1.25"
      recruiting-app.io/max-concurrent-requests: "10"
      recruiting-app.io/reddit-limit-per-query: "100"
      recruiting-app.io/reddit-time-filter: "all"
      recruiting-app.io/hackernews-limit-per-query: "100"
      recruiting-app.io/hackernews-pages-per-query: "2"
      recruiting-app.io/stackexchange-sites: "workplace,stackoverflow,softwareengineering,cseducators"
      recruiting-app.io/stackexchange-queries: "technical interview,behavioral interview,system design interview,software engineer interview,coding interview,phone screen,take home assignment,online assessment,new grad interview,internship interview,resume screen,offer negotiation,leetcode"
      recruiting-app.io/stackexchange-limit-per-query: "50"
      recruiting-app.io/stackexchange-pages-per-query: "2"
      recruiting-app.io/devto-tags: "interview,career,jobhunt,jobsearch,systemdesign,leetcode,programming,webdev,javascript,python,java,devops,softwareengineering,computerscience"
      recruiting-app.io/devto-limit-per-tag: "80"
      recruiting-app.io/devto-pages-per-tag: "2"
      recruiting-app.io/geeksforgeeks-max-pages: "12"
      recruiting-app.io/code360-pages: "10"
      recruiting-app.io/code360-limit-per-page: "100"
      recruiting-app.io/nowcoder-discover-urls: "https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E7%BB%8F,https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E8%AF%95,https://www.nowcoder.com/discuss?type=2&order=3&query=%E6%A0%A1%E6%8B%9B,https://www.nowcoder.com/discuss?type=2&order=3&query=%E5%AE%9E%E4%B9%A0,https://www.nowcoder.com/discuss?type=0&order=3,https://www.nowcoder.com/?target=main"
      recruiting-app.io/nowcoder-limit: "200"
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        cpu: 5m
        memory: 16Mi

  - name: chris-pc-1-scraper-switch
    component: external-worker-switch
    image: registry.k8s.io/pause
    tag: "3.10"
    replicas: 1
    autoDeploy:
      enabled: false
    labels:
      local-llm.io/worker: chris-pc-1-scraper
      local-llm.io/optional: "true"
      recruiting-app.io/worker: chris-pc-1-scraper
      recruiting-app.io/role: crawler
    extraSelectorLabels:
      local-llm.io/worker: chris-pc-1-scraper
    annotations:
      local-llm.io/control-help: "Scale replicas to 1 to enable CHRIS-PC-1 recruiting scraper, or 0 to stop it."
      local-llm.io/controlled-by: "scripts/local-scraper-worker-controller.ps1 running on CHRIS-PC-1"
      recruiting-app.io/image: "ghcr.io/chrischang314/recruiting-app/scraper:pc-crawler-amd64"
      recruiting-app.io/sources: "geeksforgeeks,code360,stackexchange,devto,nowcoder,hackernews,reddit"
      recruiting-app.io/crawl-interval-hours: "0.5"
      recruiting-app.io/min-request-interval-secs: "0.5"
      recruiting-app.io/max-request-interval-secs: "1.25"
      recruiting-app.io/max-concurrent-requests: "10"
      recruiting-app.io/reddit-limit-per-query: "100"
      recruiting-app.io/reddit-time-filter: "all"
      recruiting-app.io/hackernews-limit-per-query: "100"
      recruiting-app.io/hackernews-pages-per-query: "2"
      recruiting-app.io/stackexchange-sites: "workplace,stackoverflow,softwareengineering,cseducators"
      recruiting-app.io/stackexchange-queries: "technical interview,behavioral interview,system design interview,software engineer interview,coding interview,phone screen,take home assignment,online assessment,new grad interview,internship interview,resume screen,offer negotiation,leetcode"
      recruiting-app.io/stackexchange-limit-per-query: "50"
      recruiting-app.io/stackexchange-pages-per-query: "2"
      recruiting-app.io/devto-tags: "interview,career,jobhunt,jobsearch,systemdesign,leetcode,programming,webdev,javascript,python,java,devops,softwareengineering,computerscience"
      recruiting-app.io/devto-limit-per-tag: "80"
      recruiting-app.io/devto-pages-per-tag: "2"
      recruiting-app.io/geeksforgeeks-max-pages: "12"
      recruiting-app.io/code360-pages: "10"
      recruiting-app.io/code360-limit-per-page: "100"
      recruiting-app.io/nowcoder-discover-urls: "https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E7%BB%8F,https://www.nowcoder.com/discuss?type=2&order=3&query=%E9%9D%A2%E8%AF%95,https://www.nowcoder.com/discuss?type=2&order=3&query=%E6%A0%A1%E6%8B%9B,https://www.nowcoder.com/discuss?type=2&order=3&query=%E5%AE%9E%E4%B9%A0,https://www.nowcoder.com/discuss?type=0&order=3,https://www.nowcoder.com/?target=main"
      recruiting-app.io/nowcoder-limit: "200"
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        cpu: 5m
        memory: 16Mi

  # ── Frontend ───────────────────────────────────────────────────────────────
  - name: frontend
    image: ghcr.io/chrischang314/recruiting-app/frontend
    tag: main
    serviceType: LoadBalancer
    port: 13000
    containerPort: 3000
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker

    env:
      # Server-side Next.js → backend (in-cluster, no port exposure needed).
      - name: API_URL
        value: http://recruiting-app-api:8000

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    probes:
      readiness:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 20
        periodSeconds: 10

  # -- Public demo frontend ----------------------------------------------------
  # This is a separate build from the LAN frontend because the public site mounts
  # the app at /recruiting-app while recruitingapp.lan serves it from /.
  - name: frontend-public
    image: ghcr.io/chrischang314/recruiting-app/frontend
    tag: public
    port: 13001
    containerPort: 3000
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    autoDeploy:
      enabled: true

    env:
      - name: API_URL
        value: http://recruiting-app-api:8000
      - name: NEXT_PUBLIC_BASE_PATH
        value: /recruiting-app

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    probes:
      readiness:
        httpGet:
          path: /recruiting-app/
          port: 3000
        initialDelaySeconds: 20
        periodSeconds: 10

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: recruitingapp.lan
      paths:
        # Keep user-facing routes on the Next.js frontend. The frontend calls
        # the API through the in-cluster API_URL, so API path prefixes here
        # would turn pages like /posts/123 and /search into raw JSON.
        - path: /healthz
          pathType: Exact
          service: api
          port: 8000
        - path: /
          pathType: Prefix
          service: frontend
          port: 13000
