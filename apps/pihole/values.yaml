# Pi-hole — network-wide DNS sinkhole on the always-on Raspberry Pi.
#
# BEFORE DEPLOYING:
#   1. Create or copy the K8s secret:
#        kubectl create secret generic pihole-secret \
#          --from-literal=webpassword='<your-password-plaintext>'
#
#   2. Copy Pi-hole data to the Pi host:
#        rsync -av /Users/chrischang/Projects/pihole/etc-pihole/ \
#          chrischang@192.168.4.56:/srv/pihole/etc-pihole/
#        rsync -av /Users/chrischang/Projects/pihole/etc-dnsmasq.d/ \
#          chrischang@192.168.4.56:/srv/pihole/etc-dnsmasq.d/
#
#   3. Deploy to the rpi5-k3s context, then update the router DNS target to
#      192.168.4.56 after verification.

namespace: default
nameOverride: pihole

services:
  - name: pihole
    image: pihole/pihole
    tag: latest
    serviceName: pihole

    # Port 80: web admin UI served directly via LoadBalancer.
    # Pi-hole already owns port 80 on this host, so we keep it — ingress-nginx
    # stays on 8080/8443 as before.
    port: 80
    serviceType: LoadBalancer

    # DNS ports exposed alongside the web UI on the same LoadBalancer.
    extraPorts:
      - name: dns-tcp
        port: 53
        protocol: TCP
      - name: dns-udp
        port: 53
        protocol: UDP

    replicas: 1
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: rpi5-control

    # Keel polls Docker Hub and recreates the pod when :latest changes.
    autoDeploy:
      enabled: true
      pollSchedule: "@every 24h"

    env:
      - name: TZ
        value: America/New_York
      - name: FTLCONF_webserver_api_password
        valueFrom:
          secretKeyRef:
            name: pihole-secret
            key: webpassword
      - name: FTLCONF_dns_listeningMode
        value: all

    # NET_ADMIN is required for FTL and optional DHCP support.
    securityContext:
      capabilities:
        add:
          - NET_ADMIN

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    probes:
      readiness:
        httpGet:
          path: /admin/
          port: 80
        initialDelaySeconds: 20
        periodSeconds: 10
      liveness:
        httpGet:
          path: /admin/
          port: 80
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 3

    # Re-use migrated config data on the always-on Raspberry Pi host.
    # hostPath mounts skip PVC creation and mount directly from the Pi.
    persistence:
      - name: etc-pihole
        mountPath: /etc/pihole
        hostPath: /srv/pihole/etc-pihole
      - name: etc-dnsmasq
        mountPath: /etc/dnsmasq.d
        hostPath: /srv/pihole/etc-dnsmasq.d

# Pi-hole's web UI is on port 80 via the LoadBalancer above.
# No ingress entry is needed (and would conflict with ingress-nginx on 8080).
ingress:
  enabled: false
