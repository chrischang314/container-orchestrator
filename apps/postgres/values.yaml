# PostgreSQL 16 + pgvector — shared database for the recruiting-app.
namespace: default
nameOverride: postgres

services:
  - name: postgres
    image: pgvector/pgvector
    tag: pg16
    # Docker Hub DNS can be transiently unavailable from the Lima worker; keep
    # restarts from failing when the pgvector image is already cached locally.
    imagePullPolicy: IfNotPresent
    port: 5432
    serviceName: postgres
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    autoDeploy:
      enabled: false

    env:
      - name: POSTGRES_USER
        value: recruiting
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: recruiting-db-secret
            key: password
      - name: POSTGRES_DB
        value: recruiting
      - name: POSTGRES_HOST_AUTH_METHOD
        value: scram-sha-256
      # Silence the "initdb: error: directory ... exists but is not empty" warning
      # that fires on restart when the PVC already contains an initialized cluster.
      - name: PGDATA
        value: /var/lib/postgresql/data/pgdata

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

    probes:
      readiness:
        exec:
          command: ["pg_isready", "-U", "recruiting", "-d", "recruiting"]
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      # Do not liveness-kill this stateful NFS-backed database. During restore
      # and high-read startup, pg_isready can temporarily time out even though
      # Postgres is recovering and should be left alone. Readiness gates clients.
      startup:
        exec:
          command: ["pg_isready", "-U", "recruiting", "-d", "recruiting"]
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 180

    persistence:
      - name: pgdata
        mountPath: /var/lib/postgresql/data
        size: 10Gi
