# PostgreSQL 16 + pgvector — shared database for the recruiting-app.
namespace: default
nameOverride: postgres

services:
  - name: postgres
    image: pgvector/pgvector
    tag: pg16
    port: 5432
    serviceName: postgres
    strategy:
      type: Recreate
    nodeSelector:
      kubernetes.io/hostname: mac-mini-worker
    autoDeploy:
      enabled: false

    env:
      - name: POSTGRES_USER
        value: recruiting
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: recruiting-db-secret
            key: password
      - name: POSTGRES_DB
        value: recruiting
      - name: POSTGRES_HOST_AUTH_METHOD
        value: scram-sha-256
      # Silence the "initdb: error: directory ... exists but is not empty" warning
      # that fires on restart when the PVC already contains an initialized cluster.
      - name: PGDATA
        value: /var/lib/postgresql/data/pgdata

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    probes:
      startup:
        exec:
          command: ["pg_isready", "-U", "recruiting", "-d", "template1"]
        periodSeconds: 5
        failureThreshold: 60
      readiness:
        exec:
          command: ["pg_isready", "-U", "recruiting", "-d", "template1"]
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 12
      liveness:
        exec:
          command: ["pg_isready", "-U", "recruiting", "-d", "template1"]
        initialDelaySeconds: 120
        periodSeconds: 15

    persistence:
      - name: pgdata
        claimName: postgres-postgres-pgdata-nfs
        mountPath: /var/lib/postgresql/data
        size: 10Gi
        storageClassName: synology-nfs
